<!DOCTYPE html>
<html>
<body style="font-family: Arial; background-color: #f5f5f5; padding: 20px;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center">

            <table width="600" style="background: #ffffff; padding: 20px; border-radius: 8px;">

                <tr>
                    <td style="text-align: center;">
                        <h2 style="color: #2c3e50;">🏠 REMS System</h2>
                    </td>
                </tr>

                <tr>
                    <td>
                        <p>Xin chào <b>{{
                            <fullName></fullName>
                            }}</b>,
                        </p>

                        <p>Giao dịch của bạn đã được tạo thành công.</p>

                        <table width="100%" style="margin-top: 10px;">
                            <tr>
                                <td><b>Bất động sản:</b></td>
                                <td>{{propertyTitle}}</td>
                            </tr>
                            <tr>
                                <td><b>Giá:</b></td>
                                <td>{{price}}</td>
                            </tr>
                        </table>

                        <p style="margin-top: 20px;">
                            Cảm ơn bạn đã sử dụng hệ thống của chúng tôi!
                        </p>

                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
